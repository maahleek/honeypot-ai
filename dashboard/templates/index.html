<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AI Honeypot Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#060a0f;color:#e2e8f0;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* HEADER */
header{position:sticky;top:0;z-index:99;height:54px;background:rgba(6,10,15,.96);border-bottom:1px solid #1e2533;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(12px,3vw,24px);gap:12px}
.h-brand{display:flex;align-items:center;gap:10px;min-width:0}
.h-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.5)}60%{opacity:.7;box-shadow:0 0 0 7px rgba(34,197,94,0)}}
.h-title{font-size:clamp(.78rem,.9vw + .5rem,.95rem);font-weight:600;color:#38bdf8;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.h-badge{font-size:.6rem;font-weight:700;letter-spacing:.07em;color:#22c55e;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);padding:3px 9px;border-radius:20px;white-space:nowrap}
.h-time{font-size:.6rem;color:#64748b;white-space:nowrap}

/* PAGE */
.page{width:100%;max-width:1400px;margin:0 auto;padding:clamp(12px,2vw,20px) clamp(12px,2vw,20px) 40px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(8px,1.5vw,14px);margin-bottom:clamp(10px,1.5vw,14px)}
.stat{position:relative;background:#0d1420;border:1px solid #1e2533;border-radius:10px;padding:clamp(12px,2vw,18px) clamp(14px,2vw,20px);overflow:hidden;transition:border-color .2s,transform .2s;cursor:default}
.stat:hover{border-color:rgba(255,255,255,.1);transform:translateY(-2px)}
.stat-bar{position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.s1 .stat-bar{background:#38bdf8}.s2 .stat-bar{background:#a78bfa}.s3 .stat-bar{background:#60a5fa}.s4 .stat-bar{background:#4ade80}
.stat-lbl{font-size:clamp(.6rem,.65vw + .3rem,.7rem);font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.stat-num{font-size:clamp(1.4rem,2vw + .5rem,2rem);font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.s1 .stat-num{color:#38bdf8}.s2 .stat-num{color:#a78bfa}.s3 .stat-num{color:#60a5fa}.s4 .stat-num{color:#4ade80}
.stat-sub{font-size:clamp(.58rem,.6vw + .25rem,.65rem);color:#475569;margin-top:6px}

/* CHARTS */
.charts{display:grid;grid-template-columns:repeat(2,1fr);gap:clamp(8px,1.5vw,14px);margin-bottom:clamp(10px,1.5vw,14px)}
.card{background:#0d1420;border:1px solid #1e2533;border-radius:10px;padding:clamp(14px,2vw,18px)}
.card-ttl{font-size:clamp(.6rem,.65vw + .25rem,.68rem);font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.chart-wrap{position:relative;width:100%;height:clamp(160px,18vw,220px)}

/* FEED */
.feed{background:#0d1420;border:1px solid #1e2533;border-radius:10px;overflow:hidden}
.feed-top{display:flex;align-items:center;justify-content:space-between;padding:12px clamp(12px,2vw,18px);border-bottom:1px solid #1e2533}
.feed-lbl{font-size:clamp(.6rem,.65vw + .25rem,.68rem);font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.1em}
.feed-cnt{font-size:.65rem;color:#38bdf8}
.tbl-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:520px}
thead tr{background:#111827}
th{padding:clamp(7px,1vw,10px) clamp(10px,1.5vw,16px);font-size:clamp(.58rem,.6vw + .25rem,.65rem);font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.07em;text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid #1e2533;transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#111827}
td{padding:clamp(7px,1vw,10px) clamp(10px,1.5vw,16px);font-size:clamp(.68rem,.7vw + .3rem,.78rem);vertical-align:middle;white-space:nowrap}
.td-t{color:#475569;font-size:clamp(.6rem,.65vw + .25rem,.7rem)}
.td-s{font-weight:600;font-size:clamp(.62rem,.65vw + .28rem,.72rem)}
.SSH{color:#c084fc}.HTTP{color:#60a5fa}.FTP{color:#fb923c}.TELNET{color:#38bdf8}
.td-ip{font-size:clamp(.62rem,.65vw + .28rem,.72rem);color:#cbd5e1}
.td-ev{font-size:clamp(.6rem,.62vw + .26rem,.68rem);color:#64748b}
.td-ai{font-weight:500}
.td-cf{font-size:.62rem;color:#475569;margin-left:3px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:clamp(.55rem,.58vw + .22rem,.62rem);font-weight:700;letter-spacing:.05em}
.sev-critical{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.sev-high{background:rgba(234,179,8,.12);color:#fbbf24;border:1px solid rgba(234,179,8,.25)}
.sev-medium{background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.25)}
.sev-low{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25)}
.empty{padding:48px 16px;text-align:center;color:#475569;font-size:.85rem}

/* RESPONSIVE */
@media(max-width:900px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .charts{grid-template-columns:1fr}
}
@media(max-width:540px){
  .stats{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat{padding:12px 14px}
  .charts{gap:8px}
  .h-time{display:none}
  header{height:48px}
}
@media(max-width:360px){
  .h-title{font-size:.72rem}
  .stat-num{font-size:1.3rem}
  .stat-sub{display:none}
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0d1420}
::-webkit-scrollbar-thumb{background:#1e2533;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2d3748}
</style>
</head>
<body>

<header>
  <div class="h-brand">
    <div class="h-dot"></div>
    <span class="h-title">AI Honeypot Dashboard</span>
  </div>
  <div class="h-right">
    <span class="h-time" id="upd"></span>
    <span class="h-badge" id="pill">LIVE</span>
  </div>
</header>

<div class="page">

  <div class="stats">
    <div class="stat s1"><div class="stat-bar"></div><div class="stat-lbl">Total Events</div><div class="stat-num" id="total">0</div><div class="stat-sub">all services</div></div>
    <div class="stat s2"><div class="stat-bar"></div><div class="stat-lbl">SSH Attacks</div><div class="stat-num" id="ssh">0</div><div class="stat-sub">port 22</div></div>
    <div class="stat s3"><div class="stat-bar"></div><div class="stat-lbl">HTTP Attacks</div><div class="stat-num" id="http">0</div><div class="stat-sub">port 80</div></div>
    <div class="stat s4"><div class="stat-bar"></div><div class="stat-lbl">Unique IPs</div><div class="stat-num" id="ips">0</div><div class="stat-sub">attackers</div></div>
  </div>

  <div class="charts">
    <div class="card"><div class="card-ttl">Attack Types</div><div class="chart-wrap"><canvas id="typeC"></canvas></div></div>
    <div class="card"><div class="card-ttl">Services</div><div class="chart-wrap"><canvas id="svcC"></canvas></div></div>
  </div>

  <div class="feed">
    <div class="feed-top">
      <span class="feed-lbl">Live Attack Feed</span>
      <span class="feed-cnt" id="cnt">0 events</span>
    </div>
    <div class="tbl-scroll">
      <table>
        <thead><tr><th>Time</th><th>Service</th><th>IP Address</th><th>Event</th><th>AI Label</th><th>Severity</th></tr></thead>
        <tbody id="tb"><tr><td colspan="6"><div class="empty">Waiting for attacks...</div></td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<script>
var C=['#38bdf8','#4ade80','#f87171','#fbbf24','#a78bfa','#fb923c','#34d399'];
var tC=new Chart(document.getElementById('typeC'),{type:'doughnut',data:{labels:[],datasets:[{data:[],backgroundColor:C,borderWidth:2,borderColor:'#0d1420'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:11},boxWidth:10,padding:8}}}}});
var sC=new Chart(document.getElementById('svcC'),{type:'bar',data:{labels:[],datasets:[{data:[],backgroundColor:C,borderRadius:5,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'#1e2533'}},y:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'#1e2533'}}}}});

function stats(){
  fetch('/api/stats').then(function(r){return r.json()}).then(function(d){
    document.getElementById('total').textContent=d.total||0;
    document.getElementById('ips').textContent=Object.keys(d.top_ips||{}).length;
    document.getElementById('ssh').textContent=(d.by_service||{}).SSH||0;
    document.getElementById('http').textContent=(d.by_service||{}).HTTP||0;
    var et=d.by_event_type||{};tC.data.labels=Object.keys(et);tC.data.datasets[0].data=Object.values(et);tC.update('none');
    var sv=d.by_service||{};sC.data.labels=Object.keys(sv);sC.data.datasets[0].data=Object.values(sv);sC.update('none');
    document.getElementById('upd').textContent='Updated '+new Date().toLocaleTimeString();
  }).catch(function(){var p=document.getElementById('pill');p.textContent='OFFLINE';p.style.color='#f87171';p.style.borderColor='rgba(239,68,68,.3)';});
}

function events(){
  fetch('/api/events').then(function(r){return r.json()}).then(function(evs){
    var tb=document.getElementById('tb');
    document.getElementById('cnt').textContent=evs.length+' events';
    if(!evs.length){tb.innerHTML='<tr><td colspan="6"><div class="empty">Waiting for attacks...</div></td></tr>';return;}
    var h='';
    evs.slice(0,50).forEach(function(ev){
      var cls=ev.classification||{};
      var sev=cls.severity||'low';
      var name=cls.name||'—';
      var conf=cls.confidence?(cls.confidence*100).toFixed(0)+'%':'';
      var ts=ev.timestamp?new Date(ev.timestamp).toLocaleTimeString():'—';
      var svc=ev.service||'—';
      h+='<tr><td class="td-t">'+ts+'</td><td class="td-s '+svc+'">'+svc+'</td><td class="td-ip">'+(ev.attacker_ip||'—')+'</td><td class="td-ev">'+(ev.event_type||'—')+'</td><td class="td-ai">'+name+'<span class="td-cf">'+conf+'</span></td><td><span class="badge sev-'+sev+'">'+sev.toUpperCase()+'</span></td></tr>';
    });
    tb.innerHTML=h;
  });
}

stats();events();
setInterval(stats,3000);setInterval(events,3000);
</script>
</body>
</html>
